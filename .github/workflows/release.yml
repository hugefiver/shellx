name: Release

on:
  push:
    branches: [master]
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GVSBUILD_VERSION: '2025.3.0'
  VCPKG_OPENSSL_VERSION: '3.4.1'
  VCPKG_LIBSSH2_VERSION: '1.11.1'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libssh2-1-dev libssl-dev pkg-config
          version: 1.0

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gtk4 libssh2 openssl pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        if: runner.os == 'Windows'
        with:
          python-version: '3.12'

      - name: Cache gvsbuild
        if: runner.os == 'Windows'
        id: cache-gtk
        uses: actions/cache@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-${{ env.GVSBUILD_VERSION }}-gtk4
          save-always: true

      - name: Build GTK4 via gvsbuild
        if: runner.os == 'Windows' && steps.cache-gtk.outputs.cache-hit != 'true'
        run: |
          pip install gvsbuild==${{ env.GVSBUILD_VERSION }}
          gvsbuild build gtk4

      - name: Cache vcpkg packages
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-openssl${{ env.VCPKG_OPENSSL_VERSION }}-libssh2${{ env.VCPKG_LIBSSH2_VERSION }}-x64-static-md
          save-always: true

      - name: Install OpenSSL and libssh2 (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install openssl:x64-windows-static-md libssh2:x64-windows-static-md

      - name: Setup Windows environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gtkRoot = "C:\gtk-build\gtk\x64\release"
          echo "PKG_CONFIG_PATH=$gtkRoot\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "LIB=$gtkRoot\lib" >> $env:GITHUB_ENV
          echo "$gtkRoot\bin" >> $env:GITHUB_PATH
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

          # gvsbuild produces zlib1.lib / zlib.lib, but pkg-config emits -lz
          # which MSVC linker translates to z.lib — create alias if missing
          $libDir = "$gtkRoot\lib"
          if (-not (Test-Path "$libDir\z.lib")) {
            if (Test-Path "$libDir\zlib1.lib") {
              Copy-Item "$libDir\zlib1.lib" "$libDir\z.lib"
            } elseif (Test-Path "$libDir\zlib.lib") {
              Copy-Item "$libDir\zlib.lib" "$libDir\z.lib"
            }
          }

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rshell-${{ matrix.target }}.tar.gz rshell

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "rshell-${{ matrix.target }}"
          $gtkRoot = "C:\gtk-build\gtk\x64\release"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          Copy-Item "target\${{ matrix.target }}\release\rshell.exe" $dist

          Get-ChildItem "$gtkRoot\bin\*.dll" | Copy-Item -Destination $dist

          $schemas = "$dist\share\glib-2.0\schemas"
          New-Item -ItemType Directory -Force -Path $schemas | Out-Null
          Copy-Item "$gtkRoot\share\glib-2.0\schemas\*.xml" $schemas -ErrorAction SilentlyContinue
          if (Test-Path "$gtkRoot\share\glib-2.0\schemas\gschemas.compiled") {
            Copy-Item "$gtkRoot\share\glib-2.0\schemas\gschemas.compiled" $schemas
          } else {
            & "$gtkRoot\bin\glib-compile-schemas.exe" $schemas
          }

          if (Test-Path "$gtkRoot\lib\gdk-pixbuf-2.0") {
            $pixbuf = "$dist\lib\gdk-pixbuf-2.0"
            New-Item -ItemType Directory -Force -Path $pixbuf | Out-Null
            Copy-Item "$gtkRoot\lib\gdk-pixbuf-2.0\*" $pixbuf -Recurse
          }

          Compress-Archive -Path "$dist\*" -DestinationPath "rshell-${{ matrix.target }}.zip"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rshell-${{ matrix.target }}
          path: rshell-${{ matrix.target }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rshell-${{ matrix.target }}
          path: rshell-${{ matrix.target }}.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la rshell-*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rshell-*.tar.gz
            rshell-*.zip

      - name: Update Nightly
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly \
            --title "Nightly Build" \
            --notes "Automated build from master ($(date -u +'%Y-%m-%d %H:%M UTC')). May be unstable." \
            --prerelease \
            rshell-*.tar.gz rshell-*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
