name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GVSBUILD_VERSION: '2025.3.0'
  VCPKG_OPENSSL_VERSION: '3.4.1'
  VCPKG_LIBSSH2_VERSION: '1.11.1'

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # === Linux ===
      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libssh2-1-dev libssl-dev pkg-config
          version: 1.0

      # === macOS ===
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gtk4 libssh2 openssl pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      # === Windows ===
      - uses: actions/setup-python@v5
        if: runner.os == 'Windows'
        with:
          python-version: '3.12'

      - name: Cache gvsbuild
        if: runner.os == 'Windows'
        id: cache-gtk
        uses: actions/cache@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-${{ env.GVSBUILD_VERSION }}-gtk4

      - name: Build GTK4 via gvsbuild
        if: runner.os == 'Windows' && steps.cache-gtk.outputs.cache-hit != 'true'
        run: |
          pip install gvsbuild==${{ env.GVSBUILD_VERSION }}
          gvsbuild build gtk4

      - name: Cache vcpkg packages
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-openssl${{ env.VCPKG_OPENSSL_VERSION }}-libssh2${{ env.VCPKG_LIBSSH2_VERSION }}-x64-static-md

      - name: Install OpenSSL and libssh2 (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install openssl:x64-windows-static-md libssh2:x64-windows-static-md

      - name: Setup Windows environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gtkRoot = "C:\gtk-build\gtk\x64\release"
          echo "PKG_CONFIG_PATH=$gtkRoot\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "LIB=$gtkRoot\lib" >> $env:GITHUB_ENV
          echo "$gtkRoot\bin" >> $env:GITHUB_PATH
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

          # gvsbuild produces zlib1.lib / zlib.lib, but pkg-config emits -lz
          # which MSVC linker translates to z.lib — create alias if missing
          $libDir = "$gtkRoot\lib"
          if (-not (Test-Path "$libDir\z.lib")) {
            if (Test-Path "$libDir\zlib1.lib") {
              Copy-Item "$libDir\zlib1.lib" "$libDir\z.lib"
            } elseif (Test-Path "$libDir\zlib.lib") {
              Copy-Item "$libDir\zlib.lib" "$libDir\z.lib"
            }
          }

      - uses: Swatinem/rust-cache@v2

      - run: cargo check
      - run: cargo test --lib
      - run: cargo clippy -- -D warnings
